name: livestreamify

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: livestreamify
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d  # auto-run migrations on first start
    ports:
      - "5432:5432"
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devredis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
  
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://apex:${DB_PASSWORD:-devpassword}@postgres:5432/livestreamify?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devredis}
      MEDIA_SERVER_URL: http://media-server:8888
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
  
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
  
  media-server:
    build:
      context: ./media-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEDIA_SERVER_KEY: ${MEDIA_SERVER_KEY}
    ports:
      - "1935:1935"   # RTMP (broadcasters push here)
      - "8888:8888"   # HLS (internal; exposed via nginx)
    volumes:
      - hls_data:/tmp/hls
    depends_on:
      - backend
  
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      # media-server

volumes:
  postgres_data:
  redis_data:
  hls_data:
