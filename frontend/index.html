<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Live Streamify — Host & Watch Live Events</title>
    <meta name="description" content="Host and watch paid live events — sports, mentoring, legal consultations, music and more. Pay with M-Pesa. Works on 2G/3G." />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="color-scheme" content="dark" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- PWA manifest (injected by vite-plugin-pwa) -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Live Streamify — Host & Watch Live Events" />
    <meta property="og:description" content="Host paid live events online. Sports, mentoring, education, music — get paid via M-Pesa." />
    <meta property="og:image" content="/pwa-icon.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Live Streamify" />
    <meta name="twitter:description" content="Host paid live events online. Powered by M-Pesa." />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LiveStreamify" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-bg text-text-primary antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
