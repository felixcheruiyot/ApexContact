<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Solid background (fills entire canvas — required for maskable) -->
  <rect width="512" height="512" fill="#E8002D"/>
  <!-- Slightly smaller circle to respect the maskable safe zone (~80% of canvas) -->
  <circle cx="256" cy="256" r="160" fill="#C8001D"/>
  <!-- Play triangle -->
  <polygon points="222,186 342,256 222,326" fill="white"/>
  <!-- Signal bars -->
  <rect x="90" y="220" width="26" height="72" rx="10" fill="white"/>
  <rect x="128" y="196" width="26" height="120" rx="10" fill="white"/>
</svg>
