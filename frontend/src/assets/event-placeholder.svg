<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <rect width="1280" height="720" fill="#141418"/>
  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8002D" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#141418" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="icon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1E26" stop-opacity="1"/>
      <stop offset="100%" stop-color="#141418" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg-glow)"/>

  <!-- Icon background circle -->
  <circle cx="640" cy="330" r="96" fill="url(#icon-glow)" stroke="#1E1E26" stroke-width="2"/>

  <!-- Video camera icon (centered) -->
  <!-- Camera body -->
  <rect x="576" y="295" width="100" height="70" rx="8" fill="#2A2A35"/>
  <!-- Camera lens circle -->
  <circle cx="621" cy="330" r="22" fill="#1A1A24" stroke="#3A3A4A" stroke-width="2"/>
  <circle cx="621" cy="330" r="13" fill="#E8002D" fill-opacity="0.25"/>
  <circle cx="621" cy="330" r="6" fill="#E8002D" fill-opacity="0.5"/>
  <!-- Camera viewfinder bump -->
  <rect x="676" y="308" width="16" height="12" rx="3" fill="#2A2A35"/>
  <!-- Lens reflection -->
  <circle cx="614" cy="323" r="4" fill="white" fill-opacity="0.08"/>

  <!-- "No image" text label -->
  <text x="640" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="500" fill="#3A3A4A" letter-spacing="2">NO IMAGE</text>

  <!-- Bottom accent line -->
  <rect x="590" y="468" width="100" height="2" rx="1" fill="#E8002D" fill-opacity="0.3"/>
</svg>
