worker_processes auto;
events { worker_connections 1024; }

# ─── RTMP server (stream ingest) ─────────────────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Convert RTMP → HLS
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_cleanup on;

            # Notify the backend when a stream starts/stops.
            # Key must match MEDIA_SERVER_KEY in backend config.
            on_publish http://backend:8000/api/v1/stream/ingest/${MEDIA_SERVER_KEY}/callback;
            on_publish_done http://backend:8000/api/v1/stream/ingest/${MEDIA_SERVER_KEY}/callback;

            # Restrict who can push (stream key validated via backend)
            # Allow all for dev; add auth in production
        }
    }
}

# ─── HTTP server (HLS delivery + stats) ──────────────────────────────────────
http {
    sendfile on;
    tcp_nopush on;

    server {
        listen 8888;

        # HLS segments
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # RTMP stats endpoint
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
