events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    upstream media {
        server media-server:8888;
        keepalive 8;
    }

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=5r/s;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Common proxy settings
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
        # Retry once on connection failures or upstream errors
        proxy_next_upstream     error timeout http_502 http_503;
        proxy_next_upstream_tries 2;

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
        }

        # IntaSend webhook — no rate limit, must always reach backend
        location /api/v1/payments/callback {
            proxy_pass         http://backend;
            proxy_next_upstream off;   # don't retry webhooks (idempotency)
        }

        # ── HLS streaming ─────────────────────────────────────────────────────
        location /hls/ {
            limit_req zone=stream burst=50 nodelay;
            proxy_pass        http://media/hls/;
            proxy_read_timeout 300s;   # long-lived for segment fetches
            add_header        Cache-Control "no-cache";
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
        }
    }
}
