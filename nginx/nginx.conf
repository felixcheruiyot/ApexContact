events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Docker's embedded DNS resolver.
    # Using variables in proxy_pass (see below) makes nginx resolve
    # hostnames per-request instead of at startup, so it won't crash
    # if an upstream container isn't ready the instant nginx starts.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=5r/s;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Shared proxy settings
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Upstream addresses as variables — nginx resolves via 127.0.0.11
        # each time, so restarts of upstream containers are handled gracefully
        set $backend  "http://backend:8000";
        set $frontend "http://frontend:80";
        set $media    "http://media-server:8888";
        set $livekit  "http://livekit:7880";

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend;
        }

        # IntaSend webhook — no rate limit, no retry (must not duplicate)
        location = /api/v1/payments/callback {
            proxy_pass $backend;
        }

        # ── LiveKit WebSocket (audio commentary rooms) ───────────────────────
        # Strips /livekit prefix so LiveKit server sees /rtc?... directly.
        location /livekit/ {
            rewrite ^/livekit/(.*)$ /$1 break;
            proxy_pass $livekit;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── WebSocket (chat / commentary) ────────────────────────────────────
        location /ws/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;  # keep long-lived WS connections alive
            proxy_send_timeout 3600s;
        }

        # ── HLS streaming ─────────────────────────────────────────────────────
        location /hls/ {
            limit_req zone=stream burst=50 nodelay;
            proxy_pass        $media;
            proxy_read_timeout 300s;
            add_header        Cache-Control "no-cache";
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass $frontend;
        }
    }
}
