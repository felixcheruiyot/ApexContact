events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=stream:10m rate=5r/s;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Shared proxy settings (HTTP/1.1 keepalive for non-WS locations)
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        set $backend  "http://backend:8000";
        set $frontend "http://frontend:80";
        set $media    "http://media-server:8888";

        # ── API ───────────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $backend;
        }

        # IntaSend webhook — no rate limit, no retry (must not duplicate)
        location = /api/v1/payments/callback {
            proxy_pass $backend;
        }

        # ── WebSocket (chat / commentary) ─────────────────────────────────────
        location /ws/ {
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── HLS streaming ─────────────────────────────────────────────────────
        location /hls/ {
            limit_req zone=stream burst=50 nodelay;
            proxy_pass        $media;
            proxy_read_timeout 300s;
            add_header        Cache-Control "no-cache";
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass $frontend;
        }
    }
}
